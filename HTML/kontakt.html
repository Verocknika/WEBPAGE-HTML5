<!DOCTYPE html>
<html lang="sk">
<head>
    <link rel="icon" type="image/png" href="../favicon/foxina.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Veronika</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/kontakt.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="logo-link">
            <img src="../favicon/foxina.png" alt="Veronika" class="navbar-logo">
            <span class="name">Veronika</span>
        </a>
        <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <ul class="nav-links">
            <li><a href="../index.html">Domov</a></li>
            <li><a href="../HTML/omne.html">O mne</a></li>
            <li><a href="../HTML/skusenosti.html">Skúsenosti</a></li>
            <li><a href="../HTML/znalosti.html">Znalosti</a></li>
            <li><a href="../HTML/kontakt.html" class="active">Kontakt</a></li>
        </ul>
    </nav>
    <main class="narrow-container">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1>Napíšte mi <span>správu</span></h1>
            <p>Máte otázku? Vyplňte formulár a ja sa vám ozvem späť.</p>
        </div>
        <div class="card">
            <form action="https://formspree.io/f/xeereklv" method="POST" enctype="multipart/form-data" class="modern-form">
                <div class="form-group">
                    <label>Váš e-mail</label>
                    <input type="email" name="email" placeholder="vas@email.com" required>
                </div>
                <div class="form-group">
                    <label>Správa</label>
                    <textarea name="message" rows="6" placeholder="Čo máte na mysli?" required></textarea>
                </div>
                <button type="submit" class="btn primary" style="width: 100%;">Odoslať správu</button>
            </form>
        </div>
    </main>
    <footer>
        <div class="footer-container">
            <div></div>
            <div class="footer-content">
                <p>&copy; 2026 <span>Veronika</span>. Všetky práva vyhradené.</p>
            </div>
            <div class="footer-socials-list">
                <a href="https://www.linkedin.com/in/veronika-m-4543b3298/" target="_blank">
                    <i class="fa-brands fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://github.com/Verocknika" target="_blank">
                    <i class="fa-brands fa-github"></i> GitHub
                </a>
            </div>
        </div>
    </footer>
    <script src="../JS/main.js"></script>
</body>
</html>
